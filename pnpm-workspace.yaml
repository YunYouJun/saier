shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # Required by workbox-build@7.4.1; pnpm 11 flags this prerelease as a provenance downgrade.
  - '@trickfilm400/rollup-plugin-off-main-thread@3.0.0-pre1'
  # pnpm no-downgrade currently compares semver trust evidence across majors for this legacy transitive version.
  - semver@6.3.1
packages:
  - docs
  - examples/*
  - packages/*
  - site
overrides:
  typescript: 5.9.3
catalog:
  '@iconify-json/svg-spinners': ^1.2.4
  '@shikijs/vitepress-twoslash': ^4.2.0
  '@unocss/reset': ^66.7.0
  '@vueuse/core': ^14.3.0
  '@yunyoujun/docs': ^0.1.14
  floating-vue: ^5.2.2
  pinia: ^3.0.4
  unocss: ^66.7.0
  unplugin-vue-components: ^32.1.0
  vite: ^7.3.6
  vite-plugin-vue-devtools: ^8.1.2
  vitepress: ^2.0.0-alpha.17
  vitepress-plugin-group-icons: ^1.7.5
  vue: ^3.5.35
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js-pure: false
  esbuild: true
  simple-git-hooks: false
  vue-demi: true
